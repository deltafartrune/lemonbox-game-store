version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: lemonbox-mongo
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db
    networks:
      - lemonbox-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lemonbox-backend
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:password@mongo:27017/lemonbox?authSource=admin
      JWT_SECRET: your_jwt_secret_key_change_in_production
      PORT: 5000
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - lemonbox-network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: lemonbox-frontend
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - lemonbox-network
    command: npm run dev

volumes:
  mongo_data:

networks:
  lemonbox-network:
    driver: bridge
